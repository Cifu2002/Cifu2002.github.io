<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policia</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <body>
        <div class="video-container">
            <video id="videoPlayer" controls>
                <source src="videos/parte2.mp4" type="video/mp4">
                Tu navegador no soporta la reproducción de video.
            </video>

            <div id="choices" class="choices">
                <button onclick="playVideo('videos/llora.mp4')">Opción 1: Llora</button>
                <button onclick="playVideo('videos/Premium.mp4')">Opción 2: Premium</button>
            </div>
        </div>

        <script>
            const video = document.getElementById('videoPlayer');
            const choices = document.getElementById('choices');

            video.addEventListener('timeupdate', function () {
                if (video.currentTime >= ) { // Cuando el tiempo es 1 minuto (60 segundos)
                    video.pause(); // Pausa el video
                    choices.style.display = 'block'; // Muestra las opciones
                }
            });

            function playVideo(videoSrc) {
                video.src = videoSrc; // Cambia la fuente del video
                video.play(); // Reproduce el nuevo video
                choices.style.display = 'none'; // Oculta las opciones
            }
        </script>


    </body>

</html>
